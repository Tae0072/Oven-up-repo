name: CI

# dev 브랜치로 향하는 PR이 열리거나 갱신될 때 실행되는 검사들.
# 서버(server/)와 앱(app/)이 아직 없으면 해당 검사는 건너뛴다(초기 단계 대비).

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  # 1) 서버 빌드 (Spring Boot)
  server-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build server
        run: |
          if [ -f server/build.gradle ] || [ -f server/build.gradle.kts ]; then
            cd server
            chmod +x ./gradlew
            ./gradlew build --no-daemon
          else
            echo "server/ 폴더가 아직 없어 서버 빌드를 건너뜁니다."
          fi

  # 2) 앱 검사 (Flutter)
  app-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze & test app
        run: |
          if [ -f app/pubspec.yaml ]; then
            cd app
            flutter pub get
            flutter analyze
            flutter test || echo "테스트가 아직 없거나 실패 — 초기에는 통과 처리."
          else
            echo "app/ 폴더가 아직 없어 앱 검사를 건너뜁니다."
          fi

  # 3) 비밀정보(키/토큰) 유출 검사
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
